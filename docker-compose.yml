version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: supervision-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: supervision_user
      POSTGRES_PASSWORD: supervision_password
      POSTGRES_DB: supervision_campo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supervision_user -d supervision_campo"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: supervision-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: supervision-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123 &&
      mc mb --ignore-existing local/field-attachments &&
      mc mb --ignore-existing local/report-exports &&
      mc anonymous set private local/field-attachments &&
      mc anonymous set private local/report-exports
      "

volumes:
  postgres_data:
  minio_data:
