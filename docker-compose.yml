services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-supervision_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supervision_password}
      POSTGRES_DB: ${POSTGRES_DB:-supervision_campo}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform_net

  storage:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform_net

  storage-init:
    image: minio/mc:latest
    container_name: supervision-minio-init
    depends_on:
      storage:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://storage:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123} &&
      mc mb --ignore-existing local/${MINIO_ATTACHMENTS_BUCKET:-field-attachments} &&
      mc mb --ignore-existing local/${MINIO_REPORTS_BUCKET:-report-exports} &&
      mc anonymous set private local/${MINIO_ATTACHMENTS_BUCKET:-field-attachments} &&
      mc anonymous set private local/${MINIO_REPORTS_BUCKET:-report-exports}
      "
    networks:
      - platform_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      storage:
        condition: service_healthy
      storage-init:
        condition: service_completed_successfully
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      MINIO_ENDPOINT: storage:9000
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks:
      - platform_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    networks:
      - platform_net

volumes:
  postgres_data:
  minio_data:

networks:
  platform_net:
    driver: bridge
