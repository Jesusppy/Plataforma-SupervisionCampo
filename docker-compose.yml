services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-supervision_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supervision_password}
      POSTGRES_DB: ${POSTGRES_DB:-supervision_campo}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform_net

  storage:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform_net

  storage-init:
    image: minio/mc:latest
    container_name: supervision-minio-init
    depends_on:
      storage:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://storage:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123} &&
      mc mb --ignore-existing local/${MINIO_ATTACHMENTS_BUCKET:-field-attachments} &&
      mc mb --ignore-existing local/${MINIO_REPORTS_BUCKET:-report-exports} &&
      mc anonymous set private local/${MINIO_ATTACHMENTS_BUCKET:-field-attachments} &&
      mc anonymous set private local/${MINIO_REPORTS_BUCKET:-report-exports}
      "
    networks:
      - platform_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      storage:
        condition: service_healthy
      storage-init:
        condition: service_completed_successfully
    environment:
      APP_NAME: ${APP_NAME:-Plataforma de Supervision de Campo API}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-false}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-supervision_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supervision_password}
      POSTGRES_DB: ${POSTGRES_DB:-supervision_campo}
      MINIO_ENDPOINT: storage:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_ATTACHMENTS_BUCKET: ${MINIO_ATTACHMENTS_BUCKET:-field-attachments}
      MINIO_REPORTS_BUCKET: ${MINIO_REPORTS_BUCKET:-report-exports}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-pro}
      GEMINI_TRANSCRIPTION_MODEL: ${GEMINI_TRANSCRIPTION_MODEL:-gemini-2.5-flash}
      GEMINI_API_BASE_URL: ${GEMINI_API_BASE_URL:-https://generativelanguage.googleapis.com}
      USE_MOCK_LLM: ${USE_MOCK_LLM:-true}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-replace-with-strong-jwt-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_TTL_MINUTES: ${JWT_ACCESS_TOKEN_TTL_MINUTES:-1440}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@example.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin123!}
      SEED_ADMIN_FULL_NAME: ${SEED_ADMIN_FULL_NAME:-Administrador de Plataforma}
      SEED_DEMO_EMAIL: ${SEED_DEMO_EMAIL:-demo@example.com}
      SEED_DEMO_PASSWORD: ${SEED_DEMO_PASSWORD:-Demo123!}
      SEED_DEMO_FULL_NAME: ${SEED_DEMO_FULL_NAME:-Usuario Demo}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks:
      - platform_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    networks:
      - platform_net

volumes:
  postgres_data:
  minio_data:

networks:
  platform_net:
    driver: bridge
